<!doctype html>
<html lang="id">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#1e3a8a" />
		<title>OPS — SIS • Offline</title>
		<style>
			body {
				margin: 0;
				font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Arial, sans-serif;
				background: #0b1220;
				color: #e2e8f0;
			}
			.card {
				max-width: 560px;
				margin: 12vh auto;
				padding: 20px 18px;
				background: rgba(15, 23, 42, 0.8);
				border: 1px solid rgba(148, 163, 184, 0.25);
				border-radius: 14px;
				box-shadow: 0 10px 30px rgba(0,0,0,0.35);
			}
			h1 { margin: 0 0 8px; font-size: 18px; }
			p { margin: 6px 0; font-size: 13px; color: #cbd5e1; line-height: 1.45; }
			.logo {
				display: block;
				width: 72px;
				height: 72px;
				margin: 0 auto 14px;
				object-fit: contain;
			}
			.badge {
				display: inline-block;
				font-size: 11px;
				font-weight: 700;
				padding: 4px 10px;
				border-radius: 999px;
				background: rgba(59, 130, 246, 0.18);
				border: 1px solid rgba(59, 130, 246, 0.35);
				color: #bfdbfe;
				margin-bottom: 10px;
			}
			button {
				margin-top: 14px;
				width: 100%;
				padding: 10px 12px;
				border-radius: 10px;
				border: 1px solid rgba(148, 163, 184, 0.25);
				background: #1e3a8a;
				color: #fff;
				font-weight: 800;
				cursor: pointer;
			}
			button:active { transform: scale(0.99); }
		</style>
	</head>
	<body>
		<div class="card">
			<img class="logo" src="/LOGO_OPS-SIS.png" width="512" height="512" alt="OPS-SIS" />
			<div class="badge">OFFLINE</div>
			<h1>OPS — SIS sedang offline</h1>
			<p>
				Koneksi internet tidak tersedia. Halaman ini ditampilkan dari cache Service Worker.
			</p>
			<p>
				Kamu masih bisa melihat beberapa data yang sudah tersimpan cache. Untuk input LHP saat offline,
				gunakan fitur antrean (outbox) di perangkat.
			</p>
			<button onclick="location.reload()">Coba lagi</button>
		</div>
	</body>
</html>
